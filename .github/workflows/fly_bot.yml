name: Sunflower Fly Bot

on:
  workflow_dispatch:          # вызывается вручную и через cron-job.org
  schedule:
    - cron: "0 */6 * * *"    # резервный запуск раз в 6 часов

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests curl_cffi

      - name: Run bot
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          CRONJOB_API_KEY:     ${{ secrets.CRONJOB_API_KEY }}
          CRONJOB_JOB_ID:      ${{ secrets.CRONJOB_JOB_ID }}
        run: python sunflower_fly_bot.py

      - name: Commit state if changed
        run: |
          git config user.name  "fly-bot"
          git config user.email "fly-bot@users.noreply.github.com"
          touch fly_bot_state.json
          git add fly_bot_state.json
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
