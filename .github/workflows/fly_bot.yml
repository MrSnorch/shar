name: Sunflower Fly Bot

on:
  # Запуск вручную (кнопка в GitHub UI)
  workflow_dispatch:

  # Резервный встроенный cron GitHub Actions (UTC)
  # Каждые 10 минут — совпадает с интервалом cron-job.org
  schedule:
    - cron: "*/10 * * * *"

  # Запуск через cron-job.org → GitHub API (repository_dispatch)
  repository_dispatch:
    types: [fly_bot_run]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # нужно для git push состояния

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Используем PAT чтобы push-коммит не блокировал будущие runs
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python sunflower_fly_bot.py

      - name: Commit state if changed
        run: |
          git config user.name  "fly-bot"
          git config user.email "fly-bot@users.noreply.github.com"

          # Если файл состояния ещё не существует — создаём пустой,
          # чтобы git add не падал с "pathspec did not match any files"
          touch fly_bot_state.json

          git add fly_bot_state.json
          # Коммитим только если файл реально изменился
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
